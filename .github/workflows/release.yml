name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/voicekb-release.jks"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/voicekb-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --console=plain

      - name: Prepare release files
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $apkName = "VoiceKB-$tag.apk"
          Copy-Item "app/build/outputs/apk/release/app-release.apk" $apkName

          $changelog = Get-Content "CHANGELOG.md" -Raw
          $pattern = "(?ms)^##\s+$([regex]::Escape($tag))\s*(.*?)(?=^##\s+|\z)"
          $match = [regex]::Match($changelog, $pattern)
          if ($match.Success) {
            $match.Groups[1].Value.Trim() | Set-Content "release-notes.md"
          } else {
            "Changes in $tag" | Set-Content "release-notes.md"
            git log --oneline "$(git describe --tags --abbrev=0 "$tag^" 2>$null)..$tag" | Add-Content "release-notes.md"
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: VoiceKB-${{ github.ref_name }}.apk
